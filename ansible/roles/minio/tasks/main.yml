---
# roles/minio/tasks/main.yml
# Deploys MinIO as a persistent Docker container on the dev server.
# Run this ONCE (or when upgrading MinIO) — NOT on every app deploy.

- name: Create MinIO data directory
  become: true
  file:
    path: "{{ minio_data_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Create MinIO config directory
  become: true
  file:
    path: "{{ minio_config_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Pull MinIO image
  community.docker.docker_image:
    name: minio/minio
    tag: "{{ minio_image_tag }}"
    source: pull

- name: Run MinIO container
  community.docker.docker_container:
    name: dearlavion-minio
    image: "minio/minio:{{ minio_image_tag }}"
    state: started
    restart_policy: unless-stopped
    env:
      MINIO_ROOT_USER: "{{ minio_root_user }}"
      MINIO_ROOT_PASSWORD: "{{ minio_root_password }}"
      MINIO_SERVER_URL: "https://{{ minio_server_url }}"
      MINIO_BROWSER_REDIRECT_URL: "https://{{ minio_browser_url }}"
    volumes:
      - "{{ minio_data_dir }}:/data"
      - "{{ minio_config_dir }}:/root/.minio"
    command: "server /data --console-address :{{ minio_internal_web_console_port }}"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:{{ minio_internal_s3_api_port }}/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - name: "{{ dearlavion_network }}"

- name: Wait for MinIO container to be healthy
  community.docker.docker_container_info:
    name: dearlavion-minio
  register: minio_info
  until: >
    minio_info.container.State.Health is defined and
    minio_info.container.State.Health.Status == "healthy"
  retries: 10
  delay: 5

# Create the bucket on first startup
- name: Pull MinIO mc client image
  community.docker.docker_image:
    name: minio/mc
    tag: "{{ minio_mc_image_tag }}"
    source: pull

- name: Create dearlavion-media bucket if not exists
  community.docker.docker_container:
    name: minio-init
    image: "minio/mc:{{ minio_mc_image_tag }}"
    state: started
    auto_remove: true
    networks:
      - name: "{{ docker_network }}"
    command: >
      /bin/sh -c "
        mc alias set local http://dearlavion-minio:{{ minio_internal_s3_api_port }}
        {{ minio_root_user }} {{ minio_root_password }} &&
        mc mb --ignore-existing local/{{ minio_bucket }} &&
        mc anonymous set download local/{{ minio_bucket }} &&
        echo 'Bucket ready.'
      "