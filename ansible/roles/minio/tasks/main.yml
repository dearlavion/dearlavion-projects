---
# roles/minio/tasks/main.yml

# =====================================================
# 0. CLEANUP (OPTIONAL FULL RESET)
# =====================================================

- name: Stop MinIO container (cleanup)
  community.docker.docker_container:
    name: dearlavion-minio
    state: stopped
  ignore_errors: true
  #when: minio_cleanup | default(false)

- name: Remove MinIO container (cleanup)
  community.docker.docker_container:
    name: dearlavion-minio
    state: absent
    force_kill: true
  ignore_errors: true
  #when: minio_cleanup | default(false)

- name: Remove MinIO data directory (DANGEROUS)
  become: true
  file:
    path: "{{ minio_data_dir }}"
    state: absent
  #when: minio_cleanup | default(false)

- name: Remove MinIO config directory (cleanup)
  become: true
  file:
    path: "{{ minio_config_dir }}"
    state: absent
  #when: minio_cleanup | default(false)

- name: Recreate MinIO data directory
  become: true
  file:
    path: "{{ minio_data_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  when: minio_cleanup | default(false)

- name: Recreate MinIO config directory
  become: true
  file:
    path: "{{ minio_config_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  #when: minio_cleanup | default(false)


# =====================================================
# 1. CREATE DIRECTORIES (NORMAL FLOW)
# =====================================================

- name: Create MinIO data directory
  become: true
  file:
    path: "{{ minio_data_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  #when: not minio_cleanup | default(false)

- name: Create MinIO config directory
  become: true
  file:
    path: "{{ minio_config_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  #when: not minio_cleanup | default(false)


# =====================================================
# 2. PULL IMAGES
# =====================================================

- name: Pull MinIO image
  community.docker.docker_image:
    name: minio/minio
    tag: "{{ minio_image_tag }}"
    source: pull

- name: Pull MinIO MC image
  community.docker.docker_image:
    name: minio/mc
    tag: "{{ minio_mc_image_tag }}"
    source: pull


# =====================================================
# 3. RUN MINIO CONTAINER
# =====================================================

- name: Run MinIO container
  community.docker.docker_container:
    name: dearlavion-minio
    image: "minio/minio:{{ minio_image_tag }}"
    state: started
    restart_policy: unless-stopped
    recreate: true
    env:
      MINIO_ROOT_USER: "{{ minio_root_user }}"
      MINIO_ROOT_PASSWORD: "{{ minio_root_password }}"
      MINIO_SERVER_URL: "https://{{ minio_server_url }}"
      MINIO_BROWSER_REDIRECT_URL: "https://{{ minio_browser_url }}"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - "{{ minio_data_dir }}:/data"
      - "{{ minio_config_dir }}:/root/.minio"
    command: "server /data --console-address :{{ minio_internal_web_console_port }}"
    networks:
      - name: "{{ dearlavion_network }}"


# =====================================================
# 4. WAIT FOR MINIO API READY
# =====================================================

- name: Wait for MinIO API
  uri:
    url: "http://127.0.0.1:{{ minio_internal_s3_api_port }}/minio/health/ready"
    status_code: 200
  register: minio_ready
  retries: 20
  delay: 3
  until: minio_ready.status == 200


# =====================================================
# 5. CREATE BUCKET (SAFE + RETRY)
# =====================================================

- name: Create MinIO bucket and policy
  command: >
    docker run --rm --network {{ dearlavion_network }}
    minio/mc:{{ minio_mc_image_tag }}
    /bin/sh -c "
      set -e;
      mc alias set local http://dearlavion-minio:{{ minio_internal_s3_api_port }} {{ minio_root_user }} {{ minio_root_password }};
      mc mb --ignore-existing local/{{ minio_bucket }};
      mc anonymous set download local/{{ minio_bucket }};
    "
  register: bucket_result
  retries: 10
  delay: 5
  until: bucket_result.rc == 0