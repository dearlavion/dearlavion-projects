- name: Ensure Docker Registry login
  include_role:
    name: docker_registry

- name: Remove API Gateway container (force redeploy)
  community.docker.docker_container:
    name: dearlavion-gateway-service
    state: absent
    force_kill: yes

- name: Pull and run API Gateway
  community.docker.docker_container:
    name: dearlavion-gateway-service
    image: "{{ gateway_image }}"
    pull: yes
    state: started
    restart_policy: always
    networks:
      - name: dearlavion-net
    expose:
      - "{{ gateway_internal_port }}"
    env:
      auth_port: "8081"
      core_port: "8082"
      notification_port: "8083"
      akhq_port: "9000"